name: Generate Snake Contribution Animation

# Regenerates the animated snake SVG that "eats" your contribution graph.
# Runs daily and on manual trigger. No secrets required beyond the
# repo's own default GITHUB_TOKEN.

on:
  schedule:
    - cron: "0 0 * * *"   # once a day, at 00:00 UTC
  workflow_dispatch: {}     # lets you trigger it manually from the Actions tab
  push:
    branches:
      - main               # regenerate whenever you push to main

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Generate snake animation
        uses: Platane/snk@v3
        id: snake
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark

      - name: Push output to the "output" branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
